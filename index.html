<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>some good | Free Quotes For Anything</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --accent-color: #2563eb;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 90%;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        h1 span {
            color: var(--accent-color);
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><span>some good</span></h1>
    <p>Get Free Quotes For Absolutely Anything</p>
    
    <form id="lead-form">
        <div class="form-group">
            <label for="category">What do you need a quote for?</label>
            <select id="category" required>
                <option value="">Select a category...</option>
                <option value="automotive">Automotive & Vehicles</option>
                <option value="home-improvement">Home Improvement & Repair</option>
                <option value="legal">Legal & Professional Services</option>
                <option value="creative">Creative & Media Production</option>
                <option value="other">Something Else</option>
            </select>
        </div>

        <div class="form-group">
            <label for="details">Project Details</label>
            <input type="text" id="details" placeholder="Describe what you need in a few words..." required>
        </div>

        <div class="form-group">
            <label for="email">Your Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <button type="submit">Get My Free Quotes</button>
    </form>
</div>

<script>
    document.getElementById('lead-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Looking good! Your quote request has been submitted.');
    });
</script>

</body>
</html>
